
services:
  # Контейнер базы данных
  db:
    image: postgres:latest
    container_name: nirvana_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"

  # Контейнер твоего приложения
  web:
    build: .
    container_name: nirvana_app
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Формируем строку подключения из переменных в .env
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - db
    # Проверка работоспособности (healthcheck)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3